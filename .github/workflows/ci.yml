name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    name: build / test / lint (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Phase enum / rule drift gate
        run: npm run sync-phases:check

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage


      - name: Guard Phase Matrix
        run: npx vitest run test/guard/

      - name: Tier 1 Gate (platforms.ts change guard)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only FETCH_HEAD | grep -q 'src/core/platforms.ts'; then
            echo "platforms.ts changed — running full guard regression"
            npx vitest run test/guard/ --reporter verbose
          else
            echo "No platforms.ts change — skipping tier-1 guard regression"
          fi
